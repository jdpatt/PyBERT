[tox]
requires = tox-conda
envlist = format, py37, pylint, bandit, flake8, docs
skip_missing_interpreters = true

[testenv]
changedir = tests
deps =
    pytest
    pytest-cov
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands =
    py.test --basetemp={envtmpdir} \
        --cov=pybert --cov-report=html --cov-report=term-missing

[testenv:bandit]
skip_install = true
deps = bandit
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands = bandit -r {toxinidir}/pybert/

[testenv:flake8]
skip_install = true
deps = flake8
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands = flake8 pybert

[testenv:format]
skip_install = true
deps =
    black
    isort
commands =
    isort -rc {toxinidir}/pybert {toxinidir}/tests
    black {toxinidir}/pybert {toxinidir}/tests

[testenv:pylint]
deps = pylint
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands = pylint pybert

[flake8]
max-complexity = 10
max-line-length = 119
show-source = True
exclude = .venv, .tox, dist, docs, *.egg
