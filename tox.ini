[tox]
requires = tox-conda
envlist = format, py37, pylint, bandit, flake8, docs
skip_missing_interpreters = true

[testenv]
changedir = tests
deps =
    pytest
    pytest-cov
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands =
    py.test --basetemp={envtmpdir} \
        --cov=pybert --cov-report=html --cov-report=term-missing

[testenv:bandit]
deps = bandit
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands = bandit -r {toxinidir}/pybert/

[testenv:flake8]
deps = flake8
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands = flake8 pybert

[testenv:format]
skip_install = true
deps =
    black
    isort
commands =
    isort -rc {toxinidir}/pybert {toxinidir}/tests
    black {toxinidir}/pybert {toxinidir}/tests

[testenv:pylint]
deps = pylint
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
commands = pylint pybert

[testenv:docs]
deps =
    sphinx
    m2r
conda_deps=
    chaco
    empy
    enable
    parsec
    pyibis-ami
conda_channels=
    dbanas
    conda-forge
changedir = docs
commands =
    sphinx-apidoc -o ./ ../pybert
    sphinx-build -j auto -b html ./ {envtmpdir}/build

[flake8]
max-complexity = 10
max-line-length = 119
show-source = True
exclude = .venv, .tox, dist, docs, *.egg

[pydocstyle]
ignore = D105,D107,D203,D212,D213,D400
match = (?!gui).*\.py
