[tox]
envlist = format, py37, py38, pylint, bandit, flake8, mypy, pydocstyle, docs
skip_missing_interpreters = true
requires = tox-conda

[testenv]
description = Test suite for pybert.
changedir = tests
deps =
    pytest
    pytest-cov
conda_deps=
    pybert
conda_channels=
    dbanas
    defaults
    conda-forge
commands =
    py.test --basetemp={envtmpdir} -vv \
        --cov=pybert --cov-report=html --cov-report=term-missing

[testenv:bandit]
description = Check for any security hazards
skip_install = true
deps = bandit
commands = bandit -r {toxinidir}/pybert

[testenv:flake8]
description = Check for any linting concerns
skip_install = true
deps = flake8
commands = flake8 {toxinidir}/pybert

[testenv:format]
description = Auto format the code base by sorting imports, expanding them and using black.
skip_install = true
deps =
    black
    isort
    autoflake
commands =
    autoflake --in-place --remove-all-unused-imports --expand-star-imports \
        --ignore-init-module-imports --recursive {toxinidir}/pybert
    isort {toxinidir}/pybert
    black {toxinidir}/pybert

[testenv:pylint]
description = Check for any linting concerns
skip_install = true
deps = pylint
commands = pylint {toxinidir}/pybert --fail-under 9.0

[testenv:mypy]
description = Check for any type violations.
skip_install = true
setenv =
    MYPYPATH = {toxinidir}/pybert
deps = mypy
commands = mypy {toxinidir}/pybert  --ignore-missing-imports

[testenv:pydocstyle]
description = Check the doc strings for errors.
deps = pydocstyle
commands = pydocstyle {toxinidir}/pybert --count

[testenv:docs]
description = Update the api and build the html documentation.
deps =
    sphinx
    m2r
commands =
    sphinx-apidoc -o {toxinidir}/docs/source {toxinidir}/pybert
    sphinx-build -j auto -b html {toxinidir}/docs/source {toxinidir}/docs/build/html

[flake8]
max-complexity = 10
max-line-length = 119
show-source = True
exclude = .venv, .tox, dist, docs, *.egg

[pydocstyle]
ignore = D105,D107,D203,D212,D213,D400
match = (?!gui).*\.py
