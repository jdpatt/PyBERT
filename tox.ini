[tox]
envlist = py37, format, pylint, flake8, bandit, mypy, docs
skip_missing_interpreters = true

[testenv]
deps = 
    pytest-cov
    pytest-xdist
    numpy
commands = 
    py.test --basetemp={envtmpdir} -vv --cov=pybert \
            --cov-report=html --cov-report=term-missing tests/

[testenv:format]
deps =
    isort
    black
commands =
    isort -rc {toxinidir}/pybert
    black -l 99 {toxinidir}/pybert
    isort -rc {toxinidir}/tests
    black -l 99 {toxinidir}/tests

[testenv:pylint]
deps = 
    pylint
commands = 
    pylint --rcfile={toxinidir}/tox.ini {toxinidir}/pybert

[testenv:flake8]
deps = 
    flake8
commands = 
    flake8 pybert

[testenv:bandit]
deps = bandit
commands = bandit -r pybert

[testenv:mypy]
setenv =
    MYPYPATH = {toxinidir}
deps = mypy
commands = mypy -p pybert  --ignore-missing-imports

[testenv:docs]
changedir = docs
deps =
    sphinx
    m2r
commands = 
    sphinx-apidoc -o ./source ../pybert
    sphinx-build -j auto -b html source/ build/

[pytest]
addopts = -n auto

[flake8]
; E501 line too long (80 > 79 characters)
; E203 whitespace before ":"
; W503 line break before binary operator
ignore = W503,E501,E203
max-line-length = 99
show-source = True
exclude = .tox, docs, venv

[MESSAGES CONTROL]

# C0301: Line too long (Handled by black)
# C0330: Handing indent (Handled by black)
# C0412: Imports not grouped (Handled by isort)
# C0411: third party import in wrong position (Handled by isort)
# W0703: Catching too general exception (We want the GUI to handle any error.)
disable=C0301,wrong-import-position,W0703, C0330
max-line-length = 99

[isort]
known_first_party = pybert
line_length = 99